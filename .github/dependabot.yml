version: 2

updates:
  # Python-зависимости (requirements.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build
      include: scope
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # Базовый образ в Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: build
      include: scope

  # Версии GitHub Actions в workflow
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-all:
        update-types:
          - minor
          - patch
